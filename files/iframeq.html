<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>цитатаiframe</title>
   <style>
       @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap");
body {
  font-family: "Noto Sans", sans-serif;
  margin: 0;
}
   </style>
</head>
<body>
    <div style="border-left: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.07); padding: 9px; border-radius: 10px;"id="text"></div>
    <script>
        function getUrlParameter(name) {
            // Получаем строку параметров из URL
            const urlParams = new URLSearchParams(window.location.search);
            // Возвращаем значение параметра по имени
            return urlParams.get(name);
        }

        // Получаем значение параметра 'text' из URL
        const textFromUrl = getUrlParameter('text');

        // Если параметр существует, заполняем div
        if (textFromUrl) {
            document.getElementById('text').textContent = textFromUrl;
        }
    </script>
</body>
</html>
